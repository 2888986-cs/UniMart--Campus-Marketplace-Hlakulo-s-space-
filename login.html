<body class="auth-page">
<div class="auth-card">
<div class="auth-logo">
<img src="unimart-logo.png" alt="UniMart Logo" class="logo-img" />
</div>
<div class="auth-header">
<h1>Welcome back</h1>
<p>Sign in to your UniMart account</p>
</div>
<form class="auth-form" id="login-form" novalidate>
<div class="form-group">
<label class="form-label" for="login-email">Email address</label>
<input class="form-input" id="login-email" type="email"
placeholder="you@university.edu" autocomplete="email" required />
<span class="form-error" id="email-error"></span>
</div>
<div class="form-group">
<label class="form-label" for="login-password">Password</label>
<div class="input-wrapper">
<input class="form-input" id="login-password" type="password"
placeholder="Enter your password"
autocomplete="current-password" required />
<button type="button" class="input-toggle" id="pw-toggle"></button>
</div>
<span class="form-error" id="password-error"></span>
</div>
<div class="form-error" id="login-error" style="text-align:center"></div>
<button type="submit" class="btn btn-primary btn-full btn-lg"
id="login-btn">Sign in</button>
</form>
<div class="auth-footer">
Don't have an account? <a href="signup.html">Create one</a>
</div>
</div>
</body>
